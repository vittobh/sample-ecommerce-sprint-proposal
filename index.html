<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Sprint Planner — AI Story-Point Calibrator</title>
<meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="style.css"></head>
<body><header>
<div><h1>Sprint Planner — AI Story-Point Calibrator</h1><div class="tagline">CrewAI sprint planner · auto story-point calibration · risk forecast</div></div>
<button id="theme-toggle" class="theme-toggle">☾ Dark</button>
</header><main>
<div id="ai-banner" class="banner" style="display:none"></div>
<div class="row" style="margin-bottom:1rem">
  <span class="dim">Live AI keys:</span>
  <button class="btn btn-ghost" onclick="app.setKey('anthropic')">+ Claude</button>
  <button class="btn btn-ghost" onclick="app.setKey('gemini')">+ Gemini</button>
  <button class="btn btn-ghost" onclick="app.setKey('grok')">+ Grok</button>
</div>
<div class="grid" style="grid-template-columns:1fr 1fr">
  <div class="card"><h3>Sprint Header</h3>
    <div class="row"><span>Sprint</span><input class="input" id="sn" value="Sprint-243"></div>
    <div class="row" style="margin-top:.5rem"><span>Velocity</span><input class="input" id="vel" value="127" type="number"></div>
    <div class="row" style="margin-top:.5rem"><span>Days</span><input class="input" id="days" value="15" type="number"></div>
  </div>
  <div class="card"><h3>Capacity Summary</h3>
    <div id="cap"></div>
    <button class="btn btn-primary" style="margin-top:.5rem" onclick="aiForecast()">🤖 AI Risk Forecast</button>
    <div id="forecast" class="dim" style="font-size:.85rem;margin-top:.5rem"></div>
  </div>
</div>
<div class="card" style="margin-top:1rem"><h3>User Stories <button class="btn" style="font-size:.75rem;margin-left:.5rem" onclick="addStory()">+ Add</button></h3>
  <table><thead><tr><th>ID</th><th>Title</th><th>SP</th><th>Hrs</th><th>AI</th><th></th></tr></thead><tbody id="stories"></tbody></table>
  <div class="dim" style="margin-top:.5rem;font-size:.85rem">Total: <b id="total"></b> hrs · <b id="totalSP"></b> SP</div>
</div>
</main>
<script src="app.js"></script><script src="page.js"></script>
</body></html>
